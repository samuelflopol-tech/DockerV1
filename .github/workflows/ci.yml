name: CI Spring Boot Docker

on:
  push:
    branches:
      - main

jobs:
  build-backend:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./test15b

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Instalar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Compilar proyecto
        run: mvn clean package -DskipTests
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Construir imagen Docker
        run: docker build -t samflopol/backend-springboot:latest .
      - name: Publicar imagen en Docker Hub
        run: docker push samflopol/backend-springboot:latest
      - name: verificar JAR generado
        run: ls -la target
  build-frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend_test

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Construir imagen Docker
        run: docker build -t samflopol/frontend-nativo:latest .

      - name: Publicar imagen en Docker Hub
        run: docker push samflopol/frontend-nativo:latest
  deploy-all:
    needs: [build-backend, build-frontend]
    runs-on: self-hosted
    steps:
      - name: Actualizar contenedores
        run: |
          cd C:\Users\samue\Downloads\proyecto_docker_compose_limpio\proyecto_docker_compose_limpio
          docker-compose pull backend
          docker-compose pull frontend
          docker-compose up -d backend frontend
